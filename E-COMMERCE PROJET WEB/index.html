<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COOKIE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-gray">
    <nav id="mainNav" class="bg-white shadow-lg hidden">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-4">
                    <h1 class="text-2xl font-bold text-blue-600">
                        <i class="fas fa-microchip"></i> <span data-i18n="appTitle">COOKIE</span>
                    </h1>
                    <div class="hidden md:flex space-x-4 ml-8">
                        <a href="#dashboard" class="nav-link px-4 py-2 rounded hover:bg-blue-50" data-i18n="dashboard">Dashboard</a>
                        <a href="#products" class="nav-link px-4 py-2 rounded hover:bg-blue-50" data-i18n="products">Products</a>
                        <a href="#categories" class="nav-link px-4 py-2 rounded hover:bg-blue-50" data-i18n="categories">Categories</a>
                        <a href="#orders" class="nav-link px-4 py-2 rounded hover:bg-blue-50" data-i18n="orders">Orders</a>
                        <a href="#suppliers" class="nav-link px-4 py-2 rounded hover:bg-blue-50" data-i18n="suppliers">Suppliers</a>
                        <a href="#customers" class="nav-link px-4 py-2 rounded hover:bg-blue-50" data-i18n="customers">Customers</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <select id="languageSelector" class="px-3 py-2 border rounded">
                        <option value="fr">Français</option>
                        <option value="en">English</option>
                        <option value="ar">العربية</option>
                    </select>
                    <span id="userDisplay" class="text-gray-700"></span>
                    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600" data-i18n="logout">Logout</button>
                </div>
            </div>
        </div>
    </nav>
    <main id="mainContent" class="container mx-auto px-4 py-8">
    </main>
    <div id="modalContainer"></div>
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/products.js"></script>
    <script src="js/categories.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/suppliers.js"></script>
    <script src="js/customers.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
